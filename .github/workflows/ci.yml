name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format
        run: pnpm fmt:check

      - name: Test
        run: pnpm test

      - name: Typecheck / compile
        run: pnpm build

      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
          if-no-files-found: error

  desktop:
    name: Desktop (${{ matrix.platform }})
    needs: test-and-build
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
          - platform: windows-latest
          - platform: macos-latest
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - uses: dtolnay/rust-toolchain@1.93.0
        with:
          components: rustfmt, clippy

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - run: pnpm install --frozen-lockfile

      - name: Cargo fmt
        run: cargo fmt --manifest-path apps/desktop/src-tauri/Cargo.toml --check

      - name: Cargo clippy
        run: cargo clippy --manifest-path apps/desktop/src-tauri/Cargo.toml --locked --all-targets -- -D warnings

      - name: Cargo check
        run: cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml --locked

      - name: Build desktop
        run: pnpm --filter @mmx/desktop build -- --locked

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          path: |
            apps/desktop/src-tauri/target/release/bundle
            apps/desktop/src-tauri/target/release/mmx-core-ts
            apps/desktop/src-tauri/target/release/mmx-core-ts.exe
          if-no-files-found: warn
