<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mega Man X — TS Gameplay Core</title>
    <link rel="preload" href="/mega-man-x.ttf" as="font" type="font/ttf" crossorigin />
    <style>
      /* The UI face; see src/web/ui/font.ts. Served from public/ under the same
         root-relative URL Vite gives it, so this rule matches the dev entry. */
      @font-face {
        font-family: "Mega Man X";
        src: url("/mega-man-x.ttf") format("truetype");
        font-display: block;
      }
      :root { color-scheme: dark; }
      html, body { height: 100%; }
      body {
        margin: 0;
        background: #05070f;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      canvas {
        display: block; /* no inline baseline gap under the canvas */
        image-rendering: crisp-edges; /* fallback first — `pixelated` overrides it below */
        image-rendering: pixelated;
        /* The display size is set in JS to a whole multiple of the view (see
           fitCanvas). These caps only bite on a window too small for even a 1:1
           view, where letterboxing a blurry picture beats cropping the play area. */
        max-width: 100%;
        max-height: 100%;
      }
      #debug-profiler {
        position: fixed;
        top: 8px;
        right: 8px;
        z-index: 10;
        box-sizing: border-box;
        width: 256px;
        padding: 8px;
        border: 1px solid #395564;
        background: rgb(5 10 16 / 92%);
        color: #d7edf7;
        font: 11px/1.35 ui-monospace, "Cascadia Mono", monospace;
        pointer-events: none;
      }
      #debug-profiler strong,
      #debug-profiler small { display: block; }
      #debug-profiler small {
        color: #7f9daa;
        margin-bottom: 5px;
      }
      #debug-profiler canvas {
        width: 240px;
        height: 64px;
        margin-bottom: 5px;
      }
      #debug-profiler pre {
        margin: 0;
        font: inherit;
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <script type="module" src="/dist/web/main.js"></script>
  </body>
</html>
