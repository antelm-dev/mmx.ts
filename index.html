<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mega Man X — TS Gameplay Core</title>
    <style>
      :root { color-scheme: dark; }
      html, body { height: 100%; }
      body {
        margin: 0;
        background: #05070f;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      canvas {
        display: block; /* no inline baseline gap under the canvas */
        image-rendering: crisp-edges; /* fallback first — `pixelated` overrides it below */
        image-rendering: pixelated;
        /* The display size is set in JS to a whole multiple of the view (see
           Renderer.fit). These caps only bite on a window too small for even a 1:1
           view, where letterboxing a blurry picture beats cropping the play area. */
        max-width: 100%;
        max-height: 100%;
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <script type="module" src="/src/web/main.ts"></script>
  </body>
</html>
