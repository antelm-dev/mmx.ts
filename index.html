<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mega Man X — TS Gameplay Core</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        background: #05070f;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      canvas {
        display: block; /* no inline baseline gap under the canvas */
        image-rendering: crisp-edges; /* fallback first — `pixelated` overrides it below */
        image-rendering: pixelated;
        /* The display size is set in JS to a whole multiple of the view (see
           Renderer.fit). These caps only bite on a window too small for even a 1:1
           view, where letterboxing a blurry picture beats cropping the play area. */
        max-width: 100%;
        max-height: 100%;
      }
      /* Debug HUD (F1). Overlaid DOM rather than drawn into the game view, so the
         text renders at native resolution instead of the 384x224 pixel grid. */
      #debug-panel {
        position: fixed;
        top: 8px;
        right: 8px;
        z-index: 10;
        box-sizing: border-box;
        width: 256px;
        max-height: calc(100vh - 16px);
        overflow-y: auto;
        padding: 8px;
        border: 1px solid #395564;
        background: rgb(5 10 16 / 92%);
        color: #d7edf7;
        font: 11px/1.35 ui-monospace, "Cascadia Mono", monospace;
        /* Clicks fall through to the game: the panel is never a thing to aim at,
           and swallowing them would steal focus from the canvas mid-session. */
        pointer-events: none;
        user-select: text;
      }
      #debug-panel strong,
      #debug-panel small {
        display: block;
      }
      #debug-panel small {
        color: #7f9daa;
        margin-bottom: 5px;
      }
      #debug-panel canvas {
        width: 240px;
        height: 56px;
        margin-bottom: 5px;
        image-rendering: auto; /* the graph is a line chart, not pixel art */
      }
      #debug-panel pre {
        margin: 0;
        font: inherit;
        white-space: pre-wrap;
      }
      /* Transient feedback for a command key; empty (and so collapsed) most of the time. */
      #debug-panel > div:not([open]) {
        color: #ffd166;
        min-height: 1.35em;
        margin-top: 4px;
      }
      #debug-panel details {
        margin-top: 6px;
        border-top: 1px solid #24404f;
        padding-top: 4px;
        color: #7f9daa;
        /* The legend is the one part worth clicking, so it opts back in. */
        pointer-events: auto;
      }
      #debug-panel summary {
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <script type="module" src="/src/web/main.ts"></script>
  </body>
</html>
